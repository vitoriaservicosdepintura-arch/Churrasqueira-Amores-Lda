1184-b1d58069ecdd?w=600&h=400&fit=crop&q=80",tag:"🔥 Premium",category:"Pratos"},{id:6,name:"Sangria da Casa",description:"Sangria artesanal com frutas frescas da época e vinho tinto alentejano selecionado.",price:"6,00€",image:"https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=600&h=400&fit=crop&q=80",tag:"🍷 Bebida",category:"Bebidas"}],gallery:[{url:"https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=800&h=600&fit=crop&q=80",label:"Os Nossos Pratos"},{url:"https://images.unsplash.com/photo-1598103442097-8b74394b95c6?w=600&h=400&fit=crop&q=80",label:"Frango na Brasa"},{url:"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=600&h=400&fit=crop&q=80",label:"O Restaurante"},{url:"https://images.unsplash.com/photo-1529193591184-b1d58069ecdd?w=600&h=400&fit=crop&q=80",label:"Grelhados"},{url:"https://images.unsplash.com/photo-1630384060421-cb20d0e0649d?w=600&h=400&fit=crop&q=80",label:"Batatas Artesanais"},{url:"https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&h=400&fit=crop&q=80",label:"Ambiente Acolhedor"}],contact:{title:"Venha Conhecer-nos",text:"Estamos à sua espera para lhe oferecer o melhor frango do Algarve",address:`250, N125 n°66c
